name: CI

on: [push]

jobs:

  lint_content:
    name: Lint Markdown and YAML
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Run lint
        run: |
          mise run lint

  validate_bootstrap:
    name: Validate bootstrap contract
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Run bootstrap validation
        run: |
          zsh scripts/validate_bootstrap.sh

  bootstrap_integration:
    name: Bootstrap integration (real home)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Run bootstrap integration
        run: |
          zsh scripts/bootstrap_integration.sh
