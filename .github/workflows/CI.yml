name: CI

on: [push]

jobs:

  lint_content:
    name: Lint Markdown and YAML
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup mise
        uses: jdx/mise-action@v2
      - name: Run lint
        run: |
          mise run lint

  bootstrap_all_dry_run:
    name: Bootstrap --all --dry-run --force
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Test script
        run: |
          zsh ./bootstrap.sh -v --dry-run --all --force

  bootstrap_quick:
    name: Bootstrap quick
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Test script
        run: |
          zsh ./bootstrap.sh -v --hello --zsh --git --nvim --data --macos

  bootstrap_all:
    name: Bootstrap --ci
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Test script
        run: |
          zsh ./bootstrap.sh -v --ci

  bootstrap_rsync_back:
    name: Bootstrap --rsync
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2.0.0
      - name: Test script
        run: |
          zsh ./bootstrap.sh --hello --apps-config --rsync
          git status
