name: Bootstrap

on: [push]

jobs:

  bootstrap_integration:
    name: Bootstrap integration (real home)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
      - name: Run bootstrap integration
        run: |
          zsh scripts/bootstrap_integration.sh
